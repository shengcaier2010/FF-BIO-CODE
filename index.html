        .container {
            width: 100%;
            max-width: 650px;
            background-color: var(--card-bg);

            padding: 30px;

            text-align: center;

            margin-bottom: 8px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;

        p.subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #cbd5e1;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #e2e8f0;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .preview-section {
            margin-top: 25px;
        }

        .preview-box {
            background: linear-gradient(135deg, #181e29 0%, #0d1117 100%);
            border: 2px dashed #475569;
            border-radius: 8px;
            padding: 20px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            word-break: break-all;
            white-space: pre-wrap;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        .preview-box::before {
            content: "PROFILE PREVIEW";
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 9px;
            color: #475569;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .preview-text {
            width: 100%;
            font-size: 16px;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 14px;
        }

        button:hover {
            opacity: 0.9;
        }

        button.secondary {
            background-color: #334155;
            color: #fff;
        }

        .quick-codes {
            margin-top: 30px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .quick-codes h3 {
            font-size: 16px;
            color: #e2e8f0;
            margin-bottom: 12px;
        }

        .code-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
        }

        .code-btn {
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            color: #94a3b8;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .code-btn:hover {
            border-color: var(--primary-color);
            color: #fff;
        }
    </style>

         </div>

<script>
    const bioInput = document.getElementById('bioInput');
    const previewText = document.getElementById('previewText');

    function parseFFCode(input) {
        let text = input;

        // Alignment check
        let isCentered = false;
        if (text.includes('[c]') || text.includes('[C]')) {
            isCentered = true;
            text = text.replace(/\[c\]/gi, '');
        }

        // Bold & Italic check
        let isBold = false;
        let isItalic = false;

        if (text.includes('[b]') || text.includes('[B]')) {
            isBold = true;
            text = text.replace(/\[b\]/gi, '');
        }

        if (text.includes('[i]') || text.includes('[I]')) {
            isItalic = true;
            text = text.replace(/\[i\]/gi, '');
        }

        // Process Colors
        // Matches [HEXCODE] e.g. [FF0000]
        const colorRegex = /\[([0-9A-Fa-f]{6})\]/g;
        
        let formattedText = "";
        let lastIndex = 0;
        let currentColor = "#ffffff";
        let match;

        while ((match = colorRegex.exec(text)) !== null) {
            // Text before color code
            const plainText = text.substring(lastIndex, match.index);
            if (plainText) {
                formattedText += `<span style="color: #${currentColor}">${escapeHtml(plainText)}</span>`;
            }
            // Update current color
            currentColor = match[1];
            lastIndex = colorRegex.lastIndex;
        }

        // Remaining text
        const remainingText = text.substring(lastIndex);
        if (remainingText) {
            formattedText += `<span style="color: #${currentColor}">${escapeHtml(remainingText)}</span>`;
        }

        // Apply global formatting wrappers
        let styles = [];
        if (isBold) styles.push("font-weight: bold;");
        if (isItalic) styles.push("font-style: italic;");
        if (isCentered) styles.push("text-align: center; display: block; width: 100%;");

        return `<div style="${styles.join(' ')}">${formattedText}</div>`;
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function updatePreview() {
        previewText.innerHTML = parseFFCode(bioInput.value);
    }

    function insertCode(code) {
        bioInput.value += code;
        updatePreview();
    }

    function clearInput() {
        bioInput.value = '';
        updatePreview();
    }

    function copyCode() {
        bioInput.select();
        document.execCommand('copy');
    }

    bioInput.addEventListener('input', updatePreview);
    
    // Initial Render
    updatePreview();
</script>
